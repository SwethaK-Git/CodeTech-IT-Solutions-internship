<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Ordering App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
  <nav class="navbar">
    <h2 class="logo">🍔 Foodie</h2>
    <ul class="nav-links" id="navLinks">
      <li><a href="#">Home</a></li>
      <li><a href="#menu">Menu</a></li>
      <li><a href="#cart">Cart 🛒</a></li>
    </ul>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <h1>Delicious Food Delivered Fast</h1>
  <p>Order your favorite meals anytime 🍕</p>
</section>

<!-- Menu -->
<section id="menu" class="menu">
  <h2>Our Menu</h2>
  <div class="food-container">

    <div class="food-card">
      <img src="https://th.bing.com/th/id/OIP.MjpBAr5aZL-2vp4xjJqDcQHaHa?w=227&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
      <h3>Burger</h3>
      <p>₹120</p>
      <button onclick="addToCart('Burger',120)">Add to Cart</button>
    </div>

    <div class="food-card">
      <img src="https://th.bing.com/th/id/OIP.GUtzz3zgkImN3_ikBYuNfgHaE8?w=250&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
      <h3>Pizza</h3>
      <p>₹250</p>
      <button onclick="addToCart('Pizza',250)">Add to Cart</button>
    </div>

    <div class="food-card">
      <img src="https://th.bing.com/th/id/OIP.BTjk2eoQk_MlhES166t-JAHaE8?w=186&h=124&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3">
      <h3>Pasta</h3>
      <p>₹180</p>
      <button onclick="addToCart('Pasta',180)">Add to Cart</button>
    </div>

  </div>
</section>

<!-- Cart -->
<section id="cart" class="cart">
  <h2>Your Cart 🛒</h2>
  <ul id="cartItems"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Foodie App</p>
</footer>

<script src="script.js"></script>
</body>
</html>
